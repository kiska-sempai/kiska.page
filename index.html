<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Capriola';
        background: linear-gradient(135deg, #fcfcfc, #fcfcfc);
        color: #ff8ba9;
        text-align: center;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: top;
        align-items: center;
        overflow-x: hidden;
        font-weight: 400;
    }

    h1 {
        font-size: 1.5rem;
        margin-top: 4px;
        margin-bottom: 2px;
    }

    .socials-h {
        display: flex;
        flex-direction: row;
        justify-content: center;
        gap: 8px;
        align-items: center;
        height: 62px;
        margin-bottom: 8px;
    }

    .social-icon {
        padding: 0px 0px;
        font-size: 1.9rem;
        color: #ff8ba9;
        text-decoration: none;
        transition: transform 0.1s linear, box-shadow 0.1s ease, background-color 0.1s ease;

    }

    .social-icon:hover {
        transform: scale(1.1, 1.1);
    }

    .socials-v {
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .social-btn {
        background-color: rgba(249, 240, 243, 1);
        border: 2px solid rgba(249, 240, 243, 1);
        padding: 15px 25px;
        font-size: 1rem;
        color: #ff8ba9;
        border-radius: 50px;
        text-decoration: none;
        transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
        animation: popIn 0.3s linear;
        box-shadow: 0 0 0 rgba(255, 255, 255, 0);
        width: 310px;
    }

    .social-btn:hover {
        background-color: rgba(252, 252, 252, 0.75);
        transform: scale(1.04);
        color: #ffe6e6;
        box-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
    }

    .fa-svg {
        vertical-align: -0.24em;
        width: 1.25em;
        overflow: visible;
    }
